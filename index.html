<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORNC HR Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #1a365d;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #2b6cb0;
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2b6cb0;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #1f4d7f;
        }
        button:active {
            transform: scale(0.98);
        }
        .error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        .success {
            color: #388e3c;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        .demo-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        .demo-info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🏢 ORNC HR Portal</h1>
        <p class="subtitle">Personalverwaltungssystem</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-Mail:</label>
                <input type="email" id="email" name="email" placeholder="admin@ornc.de" required>
                <div class="error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Passwort:</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <div class="error" id="passwordError"></div>
            </div>

            <button type="submit">Anmelden</button>
            <div class="error" id="loginError"></div>
            <div class="success" id="loginSuccess"></div>
        </form>

        <div class="demo-info">
            <strong>Demo-Anmeldedaten:</strong><br>
            📧 <strong>admin@ornc.de</strong><br>
            🔑 <strong>admin123</strong>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('loginError');
        const loginSuccess = document.getElementById('loginSuccess');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginError.style.display = 'none';
            loginSuccess.style.display = 'none';

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                loginError.textContent = 'Bitte E-Mail und Passwort eingeben.';
                loginError.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    loginSuccess.textContent = '✅ Anmeldung erfolgreich! Weiterleitung...';
                    loginSuccess.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    loginError.textContent = data.error || 'Anmeldung fehlgeschlagen. Überprüfen Sie Ihre Anmeldedaten.';
                    loginError.style.display = 'block';
                }
            } catch (error) {
                loginError.textContent = 'Verbindungsfehler. Bitte versuchen Sie es später erneut.';
                loginError.style.display = 'block';
                console.error('Login error:', error);
            }
        });
    </script>
</body>
</html>
