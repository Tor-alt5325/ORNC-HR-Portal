        // ===========================
        // UTILITY FUNCTIONS
        // ===========================
        function speakText(text, lang = 'de') {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang === 'fa' ? 'fa-IR' : lang === 'bg' ? 'bg-BG' : lang === 'tr' ? 'tr-TR' : lang === 'hr' ? 'hr-HR' : 'de-DE';
                window.speechSynthesis.speak(utterance);
            }
        }

        function getTranslation(key, lang = 'de') {
            return translations[lang]?.[key] || translations.de[key] || key;
        }

        function getAuthToken() {
            return localStorage.getItem('token');
        }

        function setAuthToken(token) {
            localStorage.setItem('token', token);
        }

        function removeAuthToken() {
            localStorage.removeItem('token');
        }

        async function apiCall(endpoint, method = 'GET', data = null, token = null) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;

            const options = { method, headers };
            if (data) options.body = JSON.stringify(data);

            try {
                const response = await fetch(`http://localhost:3001/api${endpoint}`, options);
                if (!response.ok) throw new Error(`API error: ${response.status}`);
                return await response.json();
            } catch (err) {
                console.error('API call failed:', err);
                throw err;
            }
        }

        // Header Navigation

            const navigate = useNavigate();

            const [language, setLanguage] = useState('de');
            const token = getAuthToken();

            useEffect(() => {
                if (token) {
                    apiCall('/auth/me', 'GET', null, token)
                        .then(setUser)
                        .catch(() => {
                            removeAuthToken();
                            navigate('/login');
                        });
                }
            }, [token, navigate]);

            const handleLogout = () => {
                removeAuthToken();
                navigate('/login');
            };

            if (!token) return null;

            const t = (key) => getTranslation(key, language);
            const canSeeAll = user?.role === 'admin' || user?.role === 'hr';

            return (
                <header className="header-bg text-white p-4 shadow-lg">

        // Login Page
        function LoginPage() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const navigate = useNavigate();

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    const response = await apiCall('/auth/login', 'POST', { email, password });
                    setAuthToken(response.token);
                    navigate('/dashboard');
                } catch (err) {
                    setError('Login fehlgeschlagen. Bitte überprüfen Sie Ihre Anmeldedaten.');
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-50">
                    <div className="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
                        <h1 className="text-3xl font-bold text-center text-gray-800 mb-8">ORNC HR Portal</h1>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input
                                type="email"
                                placeholder="E-Mail"
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                                required
                                className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            />
                            <input
                                type="password"
                                placeholder="Passwort"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                required
                                className="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            />
                            {error && <p className="text-red-600 text-sm">{error}</p>}
                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full accent-bg text-white py-2 rounded-lg font-semibold hover:opacity-90 disabled:opacity-50"
                            >
                                {loading ? 'Wird geladen...' : 'Anmelden'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

            const t = (key) => getTranslation(key, language);

        // Fragebogen Einladung (Send Questionnaire)
        function FragebogenEinladung() {
            const [language] = useState('de');
            const [formData, setFormData] = useState({
                company: '',
                location: '',
                profession: '',
                employmentType: '',
                language: 'de',
                applicantEmail: '',
                applicantName: '',
            });
            const [locations, setLocations] = useState([]);
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');
            const token = getAuthToken();

            const companies = ['ORNC GmbH', 'ORNC II', 'ORNC III'];
            const locationMap = {
                'ORNC GmbH': ['Berlin', 'Munich', 'Hamburg'],
                'ORNC II': ['Frankfurt', 'Cologne', 'Stuttgart'],
                'ORNC III': ['Düsseldorf', 'Dresden', 'Hannover'],
            };
            const professions = ['Koch', 'Bäcker'];
            const employmentTypes = ['Vollzeit', 'Teilzeit', 'Minijob', 'Werkstudent'];

            const handleCompanyChange = (company) => {
                setFormData({ ...formData, company, location: '' });
                setLocations(locationMap[company] || []);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    await apiCall('/questionnaire/send-invitation', 'POST', formData, token);
                    setMessage('Einladung erfolgreich versendet!');
                    setFormData({
                        company: '', location: '', profession: '', employmentType: '',
                        language: 'de', applicantEmail: '', applicantName: '',
                    });
                    setTimeout(() => setMessage(''), 3000);
                } catch (err) {
                    setMessage('Fehler beim Versenden der Einladung.');
                }
                setLoading(false);
            };

            const t = (key) => getTranslation(key, language);

            return (
                <div className="p-8">
                    <h2 className="text-3xl font-bold mb-8 text-gray-800">{t('fragebogen')}</h2>
                    <form onSubmit={handleSubmit} className="bg-white rounded-lg shadow p-6 max-w-2xl">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label className="block text-gray-700 font-semibold mb-2">{t('company')}</label>
                                <select
                                    value={formData.company}
                                    onChange={(e) => handleCompanyChange(e.target.value)}
                                    required
                                    className="w-full px-4 py-2 border rounded-lg"
                                >
                                    <option value="">{t('selectOption')}</option>
                                    {companies.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-semibold mb-2">{t('location')}</label>
                                <select
                                    value={formData.location}
                                    onChange={(e) => setFormData({ ...formData, location: e.target.value })}
                                    required
                                    disabled={!formData.company}
                                    className="w-full px-4 py-2 border rounded-lg disabled:opacity-50"
                                >
                                    <option value="">{t('selectOption')}</option>
                                    {locations.map(l => <option key={l} value={l}>{l}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-semibold mb-2">{t('profession')}</label>
                                <select
                                    value={formData.profession}
                                    onChange={(e) => setFormData({ ...formData, profession: e.target.value })}
                                    required
                                    className="w-full px-4 py-2 border rounded-lg"
                                >
                                    <option value="">{t('selectOption')}</option>
                                    {professions.map(p => <option key={p} value={p}>{p}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-semibold mb-2">{t('employmentType')}</label>
                                <select
                                    value={formData.employmentType}
                                    onChange={(e) => setFormData({ ...formData, employmentType: e.target.value })}
                                    required
                                    className="w-full px-4 py-2 border rounded-lg"
                                >
                                    <option value="">{t('selectOption')}</option>
                                    {employmentTypes.map(e => <option key={e} value={e}>{e}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-gray-700 font-semibold mb-2">{t('language')}</label>
                                <select
                                    value={formData.language}
                                    onChange={(e) => setFormData({ ...formData, language: e.target.value })}
                                    className="w-full px-4 py-2 border rounded-lg"
                                >
                                    {languageOptions.map(opt => (
                                        <option key={opt.value} value={opt.value}>{opt.label}</option>
                                    ))}
                                </select>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                            <input
                                type="email"
                                placeholder={t('applicantEmail')}
                                value={formData.applicantEmail}
                                onChange={(e) => setFormData({ ...formData, applicantEmail: e.target.value })}

                                className="w-full px-4 py-2 border rounded-lg"
                            />
                            <input

                                placeholder={t('applicantName')}

                            disabled={loading}

                street: '', zipCode: '', city: '', country: '',

                iban: '', bic: '', healthInsurance: '',

            const [children, setChildren] = useState([]);

            const germanHealthInsurances = [
                'AOK Bayern', 'AOK Berlin-Brandenburg', 'AOK Rheinland/Hamburg', 'AOK Niedersachsen',
                'Techniker Krankenkasse', 'Barmer', 'DAK-Gesundheit', 'Kaufmännische Krankenkasse',

            const t = (key) => getTranslation(key, language);
            const isRTL = language === 'fa';

            const addChild = () => {
                setChildren([...children, { name: '', birthDate: '', certificate: null }]);
            };

            const removeChild = (idx) => {
                setChildren(children.filter((_, i) => i !== idx));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    const data = { ...formData, children, uuid };
                    const response = await apiCall('/questionnaire/submit', 'POST', data);
                    alert('Fragebogen erfolgreich eingereicht!');
                } catch (err) {
                    alert('Fehler beim Einreichen des Fragebogens.');
                }
            };

            const InputField = ({ label, name, type = 'text', required = false, ...props }) => (
                <div>
                    <label className="block text-gray-700 font-semibold mb-2">
                        {label}
                        <span
                            className="speaker-btn"
                            onClick={() => speakText(label, language)}
                            title="Abspielen"
                        >

        // Bonus Checklist
        function BonusChecklist() {
            const [language] = useState('de');
            const [employees, setEmployees] = useState([]);
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().substring(0, 7));
            const [evaluations, setEvaluations] = useState({});
            const token = getAuthToken();

            const t = (key) => getTranslation(key, language);

            useEffect(() => {
                apiCall('/employees', 'GET', null, token)
                    .then(setEmployees)
                    .catch(console.error);
            }, [token]);

            const criteria = [
                { id: 'punctuality', label: 'Pünktlichkeit' },
                { id: 'quality', label: 'Qualität der Arbeit' },
                { id: 'teamwork', label: 'Teamfähigkeit' },
                { id: 'initiatives', label: 'Eigeninitiative' },
            ];

            const calculateBonus = (checked) => {
                const percentage = (checked / criteria.length) * 100;
                if (percentage >= 75) return { percent: 15, rate: '15%' };
                if (percentage >= 45) return { percent: 7.5, rate: '7.5%' };
                return { percent: 0, rate: '0%' };
            };

            const updateEvaluation = (empId, criteriaId, checked) => {
                const key = `${empId}-${selectedMonth}`;
                const current = evaluations[key] || [];
                const updated = checked
                    ? [...current, criteriaId]
                    : current.filter(c => c !== criteriaId);
                setEvaluations({ ...evaluations, [key]: updated });
            };

            return (
                <div className="p-8">
                    <h2 className="text-3xl font-bold mb-8 text-gray-800">{t('bonus')}</h2>
                    <div className="mb-6">
                        <input
                            type="month"
                            value={selectedMonth}
                            onChange={(e) => setSelectedMonth(e.target.value)}
                            className="px-4 py-2 border rounded-lg"
                        />
                    </div>

                    <div className="space-y-6">
                        {employees.map(emp => {
                            const key = `${emp.id}-${selectedMonth}`;
                            const checked = evaluations[key] || [];
                            const bonus = calculateBonus(checked.length);
                            const baseSalary = 2000; // Example base salary

                            return (
                                <div key={emp.id} className="bg-white rounded-lg shadow p-6">
                                    <h3 className="text-xl font-bold mb-4 text-gray-800">{emp.name}</h3>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                                        {criteria.map(crit => (
                                            <label key={crit.id} className="flex items-center gap-2 cursor-pointer">
                                                <input
                                                    type="checkbox"
                                                    checked={checked.includes(crit.id)}
                                                    onChange={(e) => updateEvaluation(emp.id, crit.id, e.target.checked)}
                                                    className="w-4 h-4"
                                                />
                                                <span className="text-gray-700">{crit.label}</span>
                                            </label>
                                        ))}
                                    </div>
                                    <div className="border-t pt-4 flex justify-between items-center">
                                        <div>
                                            <p className="text-gray-600">Bonus: <span className="font-bold accent-color">{bonus.rate}</span></p>
                                            <p className="text-gray-600">Betrag: <span className="font-bold accent-color">€{((baseSalary * bonus.percent) / 100).toFixed(2)}</span></p>
                                        </div>
                                        <button className="accent-bg text-white px-4 py-2 rounded-lg hover:opacity-90">
                                            Speichern
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // Personio Integration
        function PersonioIntegration() {
            const [language] = useState('de');
            const [syncStatus, setSyncStatus] = useState({ lastSync: null, status: 'idle' });
            const token = getAuthToken();

            const t = (key) => getTranslation(key, language);

            const handleSync = async (direction) => {
                setSyncStatus({ ...syncStatus, status: 'syncing' });
                try {
                    await apiCall(`/personio/sync-${direction}`, 'POST', {}, token);
                    setSyncStatus({ lastSync: new Date(), status: 'success' });
                    setTimeout(() => setSyncStatus({ ...syncStatus, status: 'idle' }), 3000);
                } catch (err) {
                    setSyncStatus({ ...syncStatus, status: 'error' });
                }
            };

            return (
                <div className="p-8">
                    <h2 className="text-3xl font-bold mb-8 text-gray-800">{t('personio')}</h2>
                    <div className="bg-white rounded-lg shadow p-8 max-w-2xl">
                        <div className="mb-8">
                            <p className="text-gray-700 mb-4">Letzte Synchronisierung: {syncStatus.lastSync ? syncStatus.lastSync.toLocaleString('de-DE') : 'Niemals'}</p>
                            <p className="text-gray-700 mb-6">Status: <span className={`font-bold ${syncStatus.status === 'success' ? 'text-green-600' : syncStatus.status === 'error' ? 'text-red-600' : 'text-gray-600'}`}>{syncStatus.status}</span></p>
                        </div>
                        <div className="flex gap-4">
                            <button
                                onClick={() => handleSync('push')}
                                disabled={syncStatus.status === 'syncing'}
                                className="accent-bg text-white px-6 py-3 rounded-lg font-semibold hover:opacity-90 disabled:opacity-50"
                            >
                                {t('push')} (Hochladen)
                            </button>
                            <button
                                onClick={() => handleSync('pull')}
                                disabled={syncStatus.status === 'syncing'}
                                className="accent-bg text-white px-6 py-3 rounded-lg font-semibold hover:opacity-90 disabled:opacity-50"
                            >
                                {t('pull')} (Herunterladen)
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // User Management
        function UserManagement() {
            const [language] = useState('de');
            const [users, setUsers] = useState([]);
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({ email: '', role: 'branch_manager', location: '' });
            const token = getAuthToken();

            const t = (key) => getTranslation(key, language);

            useEffect(() => {
                apiCall('/users', 'GET', null, token)
                    .then(setUsers)
                    .catch(console.error);
            }, [token]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    await apiCall('/users', 'POST', formData, token);
                    setFormData({ email: '', role: 'branch_manager', location: '' });
                    setShowForm(false);
                    // Refresh users
                    const updated = await apiCall('/users', 'GET', null, token);
                    setUsers(updated);
                } catch (err) {
                    alert('Fehler beim Erstellen des Benutzers.');
                }
            };

            return (
                <div className="p-8">
                    <h2 className="text-3xl font-bold mb-8 text-gray-800">{t('users')}</h2>

                    {!showForm && (
                        <button
                            onClick={() => setShowForm(true)}
                            className="mb-6 accent-bg text-white px-4 py-2 rounded-lg hover:opacity-90"
                        >
                            Neuer Benutzer
                        </button>
                    )}

                    {showForm && (
                        <form onSubmit={handleSubmit} className="bg-white rounded-lg shadow p-6 mb-6 max-w-2xl">
                            <div className="space-y-4">
                                <input
                                    type="email"
                                    placeholder={t('email')}
                                    value={formData.email}
                                    onChange={(e) => setFormData({ ...formData, email: e.target.value })}
                                    required
                                    className="w-full px-4 py-2 border rounded-lg"
                                />
                                <select
                                    value={formData.role}
                                    onChange={(e) => setFormData({ ...formData, role: e.target.value })}
                                    className="w-full px-4 py-2 border rounded-lg"
                                >
                                    <option value="branch_manager">Branch Manager</option>
                                    <option value="admin">Admin</option>
                                    <option value="hr">HR</option>
                                </select>
                                <input
                                    type="text"
                                    placeholder={t('location')}
                                    value={formData.location}
                                    onChange={(e) => setFormData({ ...formData, location: e.target.value })}
                                    className="w-full px-4 py-2 border rounded-lg"
                                />
                                <div className="flex gap-4">
                                    <button type="submit" className="accent-bg text-white px-4 py-2 rounded-lg hover:opacity-90">
                                        {t('save')}
                                    </button>
                                    <button
                                        type="button"
                                        onClick={() => setShowForm(false)}
                                        className="px-4 py-2 border rounded-lg hover:bg-gray-100"
                                    >
                                        {t('cancel')}
                                    </button>
                                </div>
                            </div>
                        </form>
                    )}

                    <div className="bg-white rounded-lg shadow overflow-hidden">
                        <table className="w-full">
                            <thead className="header-bg text-white">
                                <tr>
                                    <th className="px-6 py-3 text-left">{t('email')}</th>
                                    <th className="px-6 py-3 text-left">Rolle</th>
                                    <th className="px-6 py-3 text-left">{t('location')}</th>
                                    <th className="px-6 py-3 text-left">{t('actions')}</th>
                                </tr>
                            </thead>
                            <tbody>
                                {users.length === 0 ? (
                                    <tr><td colSpan="4" className="px-6 py-4 text-center text-gray-500">{t('noData')}</td></tr>
                                ) : (
                                    users.map(user => (
                                        <tr key={user.id} className="border-b hover:bg-gray-50">
                                            <td className="px-6 py-3">{user.email}</td>
                                            <td className="px-6 py-3">{user.role}</td>
                                            <td className="px-6 py-3">{user.location || '-'}</td>
                                            <td className="px-6 py-3">
                                                <button className="text-red-600 hover:underline">{t('delete')}</button>
                                            </td>
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ===========================
        // MAIN APP
        // ===========================
        function App() {
            const token = getAuthToken();

            return (
                <BrowserRouter>
                    <Header />
                    <Routes>
                        <Route path="/login" element={<LoginPage />} />
                        <Route path="/questionnaire/:uuid" element={<PublicQuestionnaire />} />

                        {token ? (
                            <>
                                <Route path="/dashboard" element={<Dashboard />} />
                                <Route path="/fragebogen" element={<FragebogenEinladung />} />
                                <Route path="/employees" element={<EmployeeList />} />
                                <Route path="/employee/:id" element={<EmployeeDetail />} />
                                <Route path="/contracts" element={<Contracts />} />
                                <Route path="/templates" element={<Templates />} />
                                <Route path="/shifts" element={<ShiftPlanning />} />
                                <Route path="/bonus" element={<BonusChecklist />} />
                                <Route path="/personio" element={<PersonioIntegration />} />
                                <Route path="/users" element={<UserManagement />} />
                                <Route path="/" element={<Navigate to="/dashboard" />} />
                            </>
                        ) : (
                            <Route path="*" element={<Navigate to="/login" />} />
                        )}
                    </Routes>
                </BrowserRouter>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
